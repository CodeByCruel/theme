<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background shape -->
  <rect x="2" y="8" width="40" height="34" rx="8" fill="url(#grad)" opacity="0.15"/>
  
  <!-- Icon -->
  <path d="M12 15 L12 35 L22 35 C28 35 32 31 32 25 C32 19 28 15 22 15 Z M18 20 L22 20 C25 20 26 22 26 25 C26 28 25 30 22 30 L18 30 Z" 
        fill="url(#grad)" filter="url(#glow)"/>
  
  <!-- Text -->
  <text x="52" y="33" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#grad)" filter="url(#glow)">BSDK</text>
  <text x="120" y="33" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#8899aa" opacity="0.7">V1</text>
</svg>
